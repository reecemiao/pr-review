name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, format, typecheck & compile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Compile
        run: npm run compile

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: extension-out
          path: out/
          if-no-files-found: error
          retention-days: 7

      # TODO: add a test job once src/test/extension.test.ts has real coverage.
      # VS Code tests on Linux need xvfb: `xvfb-run -a npm test`.
