name: Release

on:
    release:
        types: [published]

permissions:
    contents: write

concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: false

jobs:
    release:
        name: Publish to VS Marketplace
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Verify tag matches package.json version
              run: |
                  TAG_VERSION="${GITHUB_REF_NAME#v}"
                  PKG_VERSION="$(node -p "require('./package.json').version")"
                  if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
                      echo "Release tag ($GITHUB_REF_NAME) does not match package.json version ($PKG_VERSION)."
                      echo "Bump package.json before tagging, or retag after bumping."
                      exit 1
                  fi

            - name: Prettier check
              run: npm run format:check

            - name: ESLint
              run: npm run lint

            - name: TypeScript typecheck
              run: npm run typecheck

            - name: Unit tests
              run: npm run test:unit

            - name: Compile
              run: npm run compile

            - name: Bundle extension
              run: npm run bundle:prod

            - name: VS Code integration tests
              run: xvfb-run -a npm run test:integration

            - name: Package extension
              run: npx vsce package --out pr-review-${{ github.ref_name }}.vsix

            - name: Upload VSIX artifact
              uses: actions/upload-artifact@v5
              with:
                  name: pr-review-${{ github.ref_name }}.vsix
                  path: pr-review-${{ github.ref_name }}.vsix
                  if-no-files-found: error
                  retention-days: 90

            - name: Attach VSIX to GitHub Release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: gh release upload "$GITHUB_REF_NAME" "pr-review-${GITHUB_REF_NAME}.vsix" --clobber

            - name: Publish to VS Marketplace
              env:
                  VSCE_PAT: ${{ secrets.VSCE_PAT }}
              run: npx vsce publish --packagePath "pr-review-${GITHUB_REF_NAME}.vsix"
