<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d2d30"/>
      <stop offset="100%" stop-color="#1e1e1e"/>
    </linearGradient>
  </defs>

  <!-- Rounded editor-dark tile -->
  <rect x="0" y="0" width="128" height="128" rx="28" ry="28" fill="url(#bg)"/>

  <!-- Diff window frame -->
  <rect x="20" y="24" width="88" height="80" rx="10" ry="10"
        fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="3"/>

  <!-- Diff rows: + (green), neutral, - (red) -->
  <g font-family="Segoe UI Semibold, Segoe UI, Arial, sans-serif" font-weight="600" font-size="20" text-anchor="middle">
    <!-- + row -->
    <text x="32" y="49" fill="#34d058">+</text>
    <rect x="46" y="37" width="52" height="10" rx="5" ry="5" fill="#34d058"/>
    <!-- neutral row -->
    <rect x="46" y="59" width="52" height="10" rx="5" ry="5" fill="#aaafb9"/>
    <!-- − row -->
    <text x="32" y="93" fill="#f97583">−</text>
    <rect x="46" y="81" width="52" height="10" rx="5" ry="5" fill="#f97583"/>
  </g>

  <!-- Check-dot badge: dark halo behind a green dot with a white check -->
  <circle cx="102" cy="98" r="18" fill="#141414"/>
  <circle cx="102" cy="98" r="15" fill="#34d058"/>
  <polyline points="95,98 101,104 110,93"
            fill="none" stroke="#ffffff" stroke-width="4"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
